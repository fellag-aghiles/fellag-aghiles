<svg width="1200" height="280" viewBox="0 0 1200 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F0524"/>
      <stop offset="35%" stop-color="#2E1065"/>
      <stop offset="70%" stop-color="#4C1D95"/>
      <stop offset="100%" stop-color="#6D28D9"/>
    </linearGradient>

    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="1"/>
      <stop offset="35%" stop-color="#C4B5FD" stop-opacity="0.9"/>
      <stop offset="70%" stop-color="#8B5CF6" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#2E1065" stop-opacity="0"/>
    </radialGradient>

    <filter id="blur">
      <feGaussianBlur stdDeviation="3"/>
    </filter>

    <filter id="softGlow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="280" fill="url(#bg)"/>

  <g opacity="0.18">
    <circle cx="120" cy="40" r="120" fill="#A78BFA" filter="url(#blur)">
      <animate attributeName="cx" values="120;180;120" dur="9s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="40;90;40" dur="9s" repeatCount="indefinite"/>
    </circle>

    <circle cx="1020" cy="250" r="150" fill="#8B5CF6" filter="url(#blur)">
      <animate attributeName="cx" values="1020;940;1020" dur="11s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="250;190;250" dur="11s" repeatCount="indefinite"/>
    </circle>

    <circle cx="620" cy="140" r="100" fill="#C4B5FD" filter="url(#blur)">
      <animate attributeName="r" values="80;130;80" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.12;0.24;0.12" dur="8s" repeatCount="indefinite"/>
    </circle>
  </g>

  <g filter="url(#softGlow)">
    <circle cx="80" cy="70" r="4" fill="url(#glow)">
      <animate attributeName="cy" values="70;230;70" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.2;1;0.2" dur="6s" repeatCount="indefinite"/>
    </circle>

    <circle cx="160" cy="210" r="3" fill="#DDD6FE">
      <animate attributeName="cy" values="210;50;210" dur="7.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;1;0.3" dur="7.5s" repeatCount="indefinite"/>
    </circle>

    <circle cx="260" cy="95" r="5" fill="url(#glow)">
      <animate attributeName="cy" values="95;235;95" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.2;0.9;0.2" dur="8s" repeatCount="indefinite"/>
    </circle>

    <circle cx="365" cy="190" r="3" fill="#C4B5FD">
      <animate attributeName="cy" values="190;40;190" dur="5.4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.2;1;0.2" dur="5.4s" repeatCount="indefinite"/>
    </circle>

    <circle cx="470" cy="80" r="4" fill="url(#glow)">
      <animate attributeName="cy" values="80;230;80" dur="6.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;1;0.3" dur="6.8s" repeatCount="indefinite"/>
    </circle>

    <circle cx="570" cy="230" r="3" fill="#EDE9FE">
      <animate attributeName="cy" values="230;70;230" dur="7.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.2;1;0.2" dur="7.2s" repeatCount="indefinite"/>
    </circle>

    <circle cx="690" cy="110" r="5" fill="url(#glow)">
      <animate attributeName="cy" values="110;245;110" dur="9s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.2;1;0.2" dur="9s" repeatCount="indefinite"/>
    </circle>

    <circle cx="810" cy="215" r="4" fill="#C4B5FD">
      <animate attributeName="cy" values="215;55;215" dur="6.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.2;1;0.2" dur="6.2s" repeatCount="indefinite"/>
    </circle>

    <circle cx="930" cy="85" r="3" fill="#DDD6FE">
      <animate attributeName="cy" values="85;235;85" dur="7.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;1;0.3" dur="7.8s" repeatCount="indefinite"/>
    </circle>

    <circle cx="1060" cy="190" r="5" fill="url(#glow)">
      <animate attributeName="cy" values="190;60;190" dur="6.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.2;1;0.2" dur="6.6s" repeatCount="indefinite"/>
    </circle>

    <circle cx="1140" cy="105" r="3" fill="#F5F3FF">
      <animate attributeName="cy" values="105;240;105" dur="8.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.2;1;0.2" dur="8.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <g opacity="0.25">
    <line x1="80" y1="70" x2="260" y2="95" stroke="#C4B5FD" stroke-width="1"/>
    <line x1="260" y1="95" x2="470" y2="80" stroke="#C4B5FD" stroke-width="1"/>
    <line x1="470" y1="80" x2="690" y2="110" stroke="#C4B5FD" stroke-width="1"/>
    <line x1="690" y1="110" x2="930" y2="85" stroke="#C4B5FD" stroke-width="1"/>
    <line x1="930" y1="85" x2="1140" y2="105" stroke="#C4B5FD" stroke-width="1"/>

    <animate attributeName="opacity" values="0.1;0.35;0.1" dur="5s" repeatCount="indefinite"/>
  </g>

  <text x="50%" y="43%" text-anchor="middle" fill="#FFFFFF" font-size="48" font-family="Arial, Helvetica, sans-serif" font-weight="700">
    Aghiles Fellag
  </text>

  <text x="50%" y="58%" text-anchor="middle" fill="#E9D5FF" font-size="22" font-family="Arial, Helvetica, sans-serif">
    Data • AI • Big Data • MLOps
  </text>

  <text x="50%" y="71%" text-anchor="middle" fill="#C4B5FD" font-size="16" font-family="Arial, Helvetica, sans-serif">
    Computer Science Student · Future Master IA &amp; Big Data at ESGI
  </text>

  <path d="M0 240 C200 300 400 200 600 250 C800 300 1000 210 1200 250 L1200 280 L0 280 Z" fill="#0F0524" opacity="0.45">
    <animate attributeName="d"
      values="
      M0 240 C200 300 400 200 600 250 C800 300 1000 210 1200 250 L1200 280 L0 280 Z;
      M0 250 C200 210 400 300 600 240 C800 200 1000 300 1200 235 L1200 280 L0 280 Z;
      M0 240 C200 300 400 200 600 250 C800 300 1000 210 1200 250 L1200 280 L0 280 Z"
      dur="8s"
      repeatCount="indefinite"/>
  </path>
</svg>
